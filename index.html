<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://dmnfd6b4vz00z.cloudfront.net/assets/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://dmnfd6b4vz00z.cloudfront.net/assets/favicon.png" />
    <link rel="apple-touch-icon" href="https://dmnfd6b4vz00z.cloudfront.net/assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Vision</title>
    <meta name="description" content="Sistema de gestión Full Vision" />
    <!-- Preload hero image solo en homepage para LCP instantáneo -->
    <script>
      (function() {
        // Solo precargar en homepage, no en login ni otras rutas
        var path = window.location.pathname;
        if (path === '/' || path === '') {
          // Usar URL cacheada del hero dinámico si existe, sino fallback estático
          var cachedUrl;
          try { cachedUrl = localStorage.getItem('hero_image_url'); } catch(e) {}
          var heroUrl = cachedUrl || 'https://dmnfd6b4vz00z.cloudfront.net/assets/heroimage-compressed.jpg';
          var l = document.createElement('link');
          l.rel = 'preload';
          l.as = 'image';
          l.href = heroUrl;
          l.fetchPriority = 'high';
          document.head.appendChild(l);
        }
      })();
    </script>
    <!-- Preconnect to critical domains for faster LCP -->
    <link rel="preconnect" href="https://slrrvl1zs2.execute-api.sa-east-1.amazonaws.com" crossorigin />
    <link rel="preconnect" href="https://dmnfd6b4vz00z.cloudfront.net" crossorigin />
    <link rel="preconnect" href="https://txjryksczwwthbgmmjms.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://slrrvl1zs2.execute-api.sa-east-1.amazonaws.com" />
    <link rel="dns-prefetch" href="https://dmnfd6b4vz00z.cloudfront.net" />
    <link rel="dns-prefetch" href="https://txjryksczwwthbgmmjms.supabase.co" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
